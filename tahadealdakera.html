<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي الذاكرة - دار سفوان القرآنية</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .quiz-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            width: 480px;
            max-width: 100%;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ffffff;
        }
        .header { 
            padding: 35px 25px; 
            text-align: center; 
        }
        .welcome-text {
            font-size: 15px;
            color: #00d2ff;
            font-weight: 600;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }
        h2 { 
            margin-top: 0;
            margin-bottom: 10px; 
            color: #ffffff;
            font-size: 24px;
            font-weight: 700;
            line-height: 1.4;
        }
        .sponsor-text {
            font-size: 13px;
            color: #a0aec0;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
        }
        .input-group { 
            margin-bottom: 22px; 
            text-align: right; 
        }
        .input-group label { 
            display: block; 
            margin-bottom: 9px; 
            font-weight: 600; 
            color: #e2e8f0;
            font-size: 15px;
        }
        .input-group input { 
            width: 100%; 
            padding: 14px 16px; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 12px; 
            font-size: 16px; 
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            transition: all 0.25s ease;
        }
        .input-group input:focus { 
            border-color: #00d2ff; 
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 3px rgba(0, 210, 255, 0.2);
            outline: none; 
        }
        
        /* تصميم قائمة المتسابقين بالصور */
        ul { 
            list-style: none; 
            padding: 0; 
            margin: 0; 
        }
        ul li { 
            font-size: 17px; 
            margin-bottom: 14px; 
            background: rgba(255, 255, 255, 0.05); 
            padding: 12px 16px; 
            border-radius: 14px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            text-align: right; 
            display: flex; 
            align-items: center; 
            cursor: pointer;
            transition: all 0.2s ease;
        }
        ul li:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: #00d2ff;
        }
        ul li input[type="radio"] { 
            margin-left: 15px; 
            transform: scale(1.3); 
            cursor: pointer; 
            accent-color: #00d2ff;
        }
        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.2);
            margin-left: 15px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            object-fit: cover;
        }
        ul li label { 
            cursor: pointer; 
            width: 100%; 
            font-weight: 600;
            color: #ffffff;
        }
        
        button { 
            background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            color: #fff; 
            border: none; 
            display: block; 
            width: 100%; 
            cursor: pointer; 
            font-size: 18px; 
            padding: 18px; 
            font-weight: bold; 
            border-radius: 0 0 24px 24px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 114, 255, 0.3);
        }
        button:hover { 
            filter: brightness(1.15);
            box-shadow: 0 6px 20px rgba(0, 114, 255, 0.5);
        }
        .btn-container {
            margin: -35px -25px -35px -25px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <div class="quiz-card">
        <form action="https://formspree.io/f/xgobpdzw" method="POST" id="main-form">
            
            <!-- الواجهة الأولى: تسجيل البيانات والترحيب -->
            <div id="step-1" class="header">
                <div class="welcome-text">مرحباً بك في تحدي الذاكرة</div>
                <h2>الذي تقيمه دار سفوان القرآنية</h2>
                <div class="sponsor-text">برعاية مركز الكفيل للبيع المباشر في سفوان</div>
                
                <div class="input-group">
                    <label>الاسم الثلاثي للمصوّت:</label>
                    <input type="text" name="الاسم الثلاثي" required placeholder="اكتب اسمك الثلاثي هنا">
                </div>
                <div class="input-group">
                    <label>رقم الهاتف:</label>
                    <input type="tel" name="رقم الهاتف" required placeholder="07xxxxxxxxx">
                </div>
                <div class="btn-container">
                    <button type="button" onclick="goToStep2()">التالي (الانتقال للتصويت)</button>
                </div>
            </div>

            <!-- الواجهة الثانية: السؤال واختيار المتسابقين -->
            <div id="step-2" class="header" style="display: none;">
                <div class="welcome-text">السؤال الموحد</div>
                <h2>توقع من الفائز بالموسم الأول من تحدي الذاكرة؟</h2>
                <div class="sponsor-text">اختر المتسابق الذي تتوقع فوزه:</div>
                
                <ul>
                    <!-- المتسابق الأول -->
                    <li onclick="document.getElementById('a').checked = true">
                        <input type="radio" name="تصويت المتسابق" id="a" value="المتسابق الأول">
                        <!-- يمكنك استبدال الرابط أدناه برابط صورة المتسابق الحقيقية لاحقاً -->
                        <img src="https://via.placeholder.com/150" class="avatar" alt="صورة المتسابق">
                        <label for="a">المتسابق الأول (اكتب الاسم هنا)</label>
                    </li>
                    
                    <!-- المتسابق الثاني -->
                    <li onclick="document.getElementById('b').checked = true">
                        <input type="radio" name="تصويت المتسابق" id="b" value="المتسابق الثاني">
                        <img src="https://via.placeholder.com/150" class="avatar" alt="صورة المتسابق">
                        <label for="b">المتسابق الثاني (اكتب الاسم هنا)</label>
                    </li>
                    
                    <!-- المتسابق الثالث -->
                    <li onclick="document.getElementById('c').checked = true">
                        <input type="radio" name="تصويت المتسابق" id="c" value="المتسابق الثالث">
                        <img src="https://via.placeholder.com/150" class="avatar" alt="صورة المتسابق">
                        <label for="c">المتسابق الثالث (اكتب الاسم هنا)</label>
                    </li>
                </ul>
                
                <div class="btn-container">
                    <button type="submit" onclick="return checkAnswer()">تأكيد وإرسال التصويت</button>
                </div>
            </div>

        </form>
    </div>

    <script>
        function goToStep2() {
            const name = document.querySelector('input[name="الاسم الثلاثي"]').value.trim();
            const phone = document.querySelector('input[name="رقم الهاتف"]').value.trim();
            
            if(name === "" || phone === "") {
                alert("الرجاء ملء الاسم ورقم الهاتف أولاً!");
                return;
            }
            
            document.getElementById('step-1').style.display = 'none';
            document.getElementById('step-2').style.display = 'block';
        }

        function checkAnswer() {
            const checked = document.querySelector('input[name="تصويت المتسابق"]:checked');
            if(!checked) {
                alert("الرجاء اختيار متسابق واحد للتصويت!");
                return false;
            }
            return true;
        }
    </script>

</body>
</html>
